backend:
  name: github
  repo: fty650660/blog-ai-in-pastoral
  branch: main

site_url: https://blog-ai-in-pastoral.netlify.app

media_folder: assets/images/posts
public_folder: /assets/images/posts

media_library:
  name: decap-media-library

collections:
  - name: posts
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
      - label: Category
        name: category
        widget: select
        options:
          - AI Thinking
          - Tech Exploration
          - AI Ethics
          - Creative AI
          - Tech Trends
          - Life Notes
      - label: Tags
        name: tags
        widget: list
        default: ["AI"]
      - label: Body
        name: body
        widget: markdown
