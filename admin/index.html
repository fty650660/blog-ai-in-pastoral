<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客管理后台 - 田园中的 AI</title>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #F8F6F4 0%, #E8E4E0 100%);
    }
    .loading-text {
      color: #2C2C2C;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-text">🌾 加载管理后台中...</div>
  </div>
  <script>
    // 初始化 Decap CMS
    CMS.init({
      config_url: '/admin/config.yml'
    }).then(() => {
      document.getElementById('loading').style.display = 'none';
    }).catch(err => {
      console.error('CMS 初始化失败:', err);
      document.getElementById('loading').innerHTML = 
        '<div class="loading-text">❌ 加载失败，请刷新重试</div>';
    });
  </script>
</body>
</html>
